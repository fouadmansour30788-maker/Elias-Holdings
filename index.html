<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elias Holdings — Operations</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}

/* Canvas particles behind everything */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Sidebar */
.sidebar{
  position:fixed;top:0;left:0;height:100vh;width:230px;
  background:rgba(4,8,4,0.75);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-right:1px solid rgba(132,204,22,0.12);
  display:flex;flex-direction:column;z-index:50;
  transition:transform 0.3s ease;
}
.sidebar-logo{
  padding:24px 18px 20px;
  border-bottom:1px solid rgba(132,204,22,0.1);
  display:flex;align-items:center;justify-content:center;
}
.sidebar-logo img{height:120px;width:auto;filter:invert(1) brightness(2)}

.nav-section{padding:16px 10px 4px}
.nav-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(132,204,22,0.35);padding:0 10px;margin-bottom:8px}

/* Updated nav-item for <a> tags */
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:6px;
  font-size:12.5px;color:rgba(255,255,255,0.45);
  cursor:pointer;border:none;background:none;
  width:100%;text-align:left;letter-spacing:0.03em;
  transition:all 0.2s;margin-bottom:2px;
  text-decoration:none; /* Important: removes link underline */
}
.nav-item:hover{background:rgba(132,204,22,0.08);color:#fff}
.nav-item.active{background:rgba(132,204,22,0.12);color:#84cc16}

.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-green{background:#84cc16}
.d-blue{background:#3b82f6}
.d-purple{background:#a855f7}
.d-gray{background:rgba(255,255,255,0.2)}

.sidebar-footer{
  margin-top:auto;padding:16px 18px;
  border-top:1px solid rgba(132,204,22,0.08);
  font-size:10px;color:rgba(255,255,255,0.2);line-height:1.7;
}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#84cc16;margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* Main scene */
.scene{
  position:fixed;top:0;left:230px;right:0;bottom:0;
  overflow:hidden;z-index:1;
}

/* Background building full bleed */
.bg-img{
  position:absolute;inset:-5%;
  transition:transform 0.08s linear;
}
.bg-img img{
  width:100%;height:100%;object-fit:cover;
  opacity:0.55;
  filter:contrast(1.1) saturate(0.8);
}
.bg-img::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 30%, rgba(0,0,0,0.15) 70%, rgba(0,0,0,0.95) 100%),
    linear-gradient(to right, rgba(0,0,0,0.7) 0%, transparent 50%);
}

/* Tower right side */
.tower{
  position:absolute;right:-40px;top:-40px;width:65%;height:115%;
  transform-style:preserve-3d;perspective:1200px;
  transition:transform 0.12s ease-out;
}
.tower img{
  width:100%;height:100%;object-fit:cover;opacity:0.9;
  filter:contrast(1.12) saturate(0.85) brightness(1.05);
  -webkit-mask-image:linear-gradient(to left, rgba(0,0,0,1) 20%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0) 100%);
  mask-image:linear-gradient(to left, rgba(0,0,0,1) 20%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0) 100%);
}
.tower::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom-left, rgba(132,204,22,0.04), transparent 60%);
  pointer-events:none;
}

/* Perspective grid floor */
.grid{
  position:absolute;bottom:0;left:0;right:0;height:60%;
  background-image:
    linear-gradient(rgba(132,204,22,0.25) 1px,transparent 1px),
    linear-gradient(90deg,rgba(132,204,22,0.25) 1px,transparent 1px);
  background-size:60px 60px;
  transform:perspective(600px) rotateX(70deg);
  transform-origin:bottom center;
  opacity:0.22;
}

/* Floating squares */
.cube-wrap{position:absolute;transform-style:preserve-3d;}
.cube-wrap1{top:10%;left:42%;width:120px;height:120px;animation:tumble1 16s linear infinite;}
.cube-wrap2{top:28%;left:45%;width:70px;height:70px;animation:tumble2 11s linear infinite;}
.cube-wrap3{top:52%;left:41%;width:38px;height:38px;animation:tumble1 8s linear infinite reverse;}

.cube{width:100%;height:100%;transform-style:preserve-3d;position:relative;}
.face{
  position:absolute;
  border:1.5px solid rgba(132,204,22,0.75);
  background:rgba(132,204,22,0.04);
  box-shadow:inset 0 0 20px rgba(132,204,22,0.08);
}
.cube-wrap1 .face{width:120px;height:120px;}
.cube-wrap2 .face{width:70px;height:70px;}
.cube-wrap3 .face{width:38px;height:38px;}

.cube-wrap1 .front {transform:translateZ(60px);}
.cube-wrap1 .back  {transform:rotateY(180deg) translateZ(60px);}
.cube-wrap1 .left  {transform:rotateY(-90deg) translateZ(60px);}
.cube-wrap1 .right {transform:rotateY(90deg)  translateZ(60px);}
.cube-wrap1 .top   {transform:rotateX(90deg)  translateZ(60px);}
.cube-wrap1 .bottom{transform:rotateX(-90deg) translateZ(60px);}

.cube-wrap2 .front {transform:translateZ(35px);}
.cube-wrap2 .back  {transform:rotateY(180deg) translateZ(35px);}
.cube-wrap2 .left  {transform:rotateY(-90deg) translateZ(35px);}
.cube-wrap2 .right {transform:rotateY(90deg)  translateZ(35px);}
.cube-wrap2 .top   {transform:rotateX(90deg)  translateZ(35px);}
.cube-wrap2 .bottom{transform:rotateX(-90deg) translateZ(35px);}

.cube-wrap3 .front {transform:translateZ(19px);}
.cube-wrap3 .back  {transform:rotateY(180deg) translateZ(19px);}
.cube-wrap3 .left  {transform:rotateY(-90deg) translateZ(19px);}
.cube-wrap3 .right {transform:rotateY(90deg)  translateZ(19px);}
.cube-wrap3 .top   {transform:rotateX(90deg)  translateZ(19px);}
.cube-wrap3 .bottom{transform:rotateX(-90deg) translateZ(19px);}

.front{
  box-shadow:
    inset 0 0 30px rgba(132,204,22,0.12),
    0 0 40px rgba(132,204,22,0.25),
    0 0 80px rgba(132,204,22,0.1);
  border-color:rgba(132,204,22,0.9);
}
.top{background:rgba(132,204,22,0.07);border-color:rgba(132,204,22,0.5);}
.right{background:rgba(132,204,22,0.05);border-color:rgba(132,204,22,0.4);}

@keyframes tumble1{
  0%  {transform:rotateX(0deg)   rotateY(0deg)   rotateZ(0deg)}
  33% {transform:rotateX(120deg) rotateY(80deg)  rotateZ(45deg)}
  66% {transform:rotateX(240deg) rotateY(160deg) rotateZ(90deg)}
  100%{transform:rotateX(360deg) rotateY(240deg) rotateZ(135deg)}
}
@keyframes tumble2{
  0%  {transform:rotateX(0deg)   rotateY(0deg)    rotateZ(0deg)}
  33% {transform:rotateX(-100deg) rotateY(120deg) rotateZ(-60deg)}
  66% {transform:rotateX(-200deg) rotateY(240deg) rotateZ(-120deg)}
  100%{transform:rotateX(-360deg) rotateY(360deg) rotateZ(-180deg)}
}

.vignette{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
}

.flare{
  position:absolute;top:-10%;right:5%;width:500px;height:500px;
  background:radial-gradient(circle, rgba(132,204,22,0.08) 0%, transparent 70%);
  pointer-events:none;z-index:2;
  animation:pulse-flare 4s ease-in-out infinite;
}
@keyframes pulse-flare{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

.scanlines{
  position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0.025;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.8) 0px, rgba(0,0,0,0.8) 1px, transparent 1px, transparent 3px);
}

.content{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 64px;max-width:620px;
}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:20px;
  border:1px solid rgba(132,204,22,0.3);
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:#84cc16;margin-bottom:28px;width:fit-content;
  animation:fadeUp 0.8s 0.2s both;
  background:rgba(132,204,22,0.05);
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#84cc16;animation:blink 2s infinite}

h1{
  font-size:clamp(3rem,6vw,5.5rem);font-weight:700;
  line-height:1.05;letter-spacing:-0.02em;
  animation:fadeUp 1s 0.4s both;
  text-shadow:0 0 80px rgba(0,0,0,0.8);
}
h1 .accent{
  color:#84cc16;position:relative;display:inline-block;
}
h1 .accent::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;
  height:2px;background:#84cc16;
  animation:scaleX 0.8s 1.1s both;transform-origin:left;
}
@keyframes scaleX{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.desc{
  margin-top:20px;
  color:rgba(255,255,255,0.5);
  font-size:clamp(0.9rem,1.3vw,1.05rem);
  line-height:1.8;max-width:420px;
  animation:fadeUp 0.8s 0.8s both;
  text-shadow:0 2px 20px rgba(0,0,0,0.9);
}

.scroll-hint{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;z-index:10;
  animation:fadeIn 1s 1.6s both;
}
.scroll-hint span{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.2)}
.scroll-arrow{width:14px;height:14px;border-right:2px solid #84cc16;border-bottom:2px solid #84cc16;transform:rotate(45deg);animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(6px)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Mobile */
.mob-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;background:rgba(0,0,0,0.7);border:1px solid rgba(132,204,22,0.2);color:#fff;width:42px;height:42px;border-radius:6px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .scene{left:0}
  .mob-toggle{display:flex}
  .content{padding:0 28px;max-width:100%}
}
</style>
</head>
