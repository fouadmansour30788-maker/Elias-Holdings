<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elias Holdings — Insights</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:#080c08;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow-x:hidden;}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:220px;background:rgba(4,8,4,0.97);backdrop-filter:blur(24px);border-right:1px solid rgba(132,204,22,0.1);display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(132,204,22,0.08);display:flex;align-items:center;justify-content:center;}
.sidebar-logo img{height:110px;width:auto;filter:invert(1) sepia(1) saturate(3) hue-rotate(60deg) brightness(1.2)}
.nav-section{padding:14px 8px 4px}
.nav-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(132,204,22,0.3);padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all 0.2s;margin-bottom:1px;text-decoration:none;}
.nav-item:hover{background:rgba(132,204,22,0.08);color:#fff}
.nav-item.active{background:rgba(132,204,22,0.12);color:#84cc16}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-green{background:#84cc16}.d-blue{background:#3b82f6}.d-purple{background:#a855f7}.d-gray{background:rgba(255,255,255,0.2)}
.sidebar-footer{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(132,204,22,0.06);font-size:10px;color:rgba(255,255,255,0.18);line-height:1.8;}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#84cc16;margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.main{margin-left:220px;min-height:100vh;padding:26px 30px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title h1{font-size:20px;font-weight:600;}
.page-title p{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;}
.refresh-btn{padding:6px 16px;background:rgba(132,204,22,0.15);border:1px solid rgba(132,204,22,0.3);border-radius:6px;color:#84cc16;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.refresh-btn:hover{background:rgba(132,204,22,0.25);}
.section-title{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(132,204,22,0.5);margin-bottom:12px;margin-top:24px;}
.insights-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.insight-card{background:rgba(255,255,255,0.03);border:1px solid rgba(132,204,22,0.08);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.insight-card.alert{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.05);}
.insight-card.warning{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05);}
.insight-card.good{border-color:rgba(132,204,22,0.3);background:rgba(132,204,22,0.05);}
.insight-card.info{border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.05);}
.insight-icon{font-size:20px;margin-bottom:8px;}
.insight-title{font-size:11px;font-weight:600;color:#fff;margin-bottom:4px;}
.insight-desc{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.6;}
.insight-value{font-size:22px;font-weight:700;margin-bottom:4px;}
.alert .insight-value{color:#ef4444;}
.warning .insight-value{color:#f59e0b;}
.good .insight-value{color:#84cc16;}
.info .insight-value{color:#60a5fa;}
.badge-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.badge-alert{background:rgba(239,68,68,0.15);color:#ef4444;}
.badge-warning{background:rgba(245,158,11,0.15);color:#f59e0b;}
.badge-good{background:rgba(132,204,22,0.15);color:#84cc16;}
.badge-info{background:rgba(59,130,246,0.15);color:#60a5fa;}
.rec-box{background:rgba(255,255,255,0.03);border:1px solid rgba(132,204,22,0.08);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.rec-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rec-num{width:24px;height:24px;border-radius:50%;background:rgba(132,204,22,0.15);color:#84cc16;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rec-title{font-size:12px;font-weight:600;color:#fff;}
.rec-body{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.7;padding-left:34px;}
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.metric{background:rgba(255,255,255,0.03);border:1px solid rgba(132,204,22,0.08);border-radius:10px;padding:14px 16px;text-align:center;}
.metric-val{font-size:24px;font-weight:700;color:#84cc16;}
.metric-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:4px;}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,0.3);font-size:12px;}
.spinner{width:30px;height:30px;border:2px solid rgba(132,204,22,0.2);border-top-color:#84cc16;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
const API_BATCH = 'http://167.71.38.67:5001';
const API_PODIO = 'http://167.71.38.67:5002';

function grade(val, good, warn) {
  if (val >= good) return 'good';
  if (val >= warn) return 'warning';
  return 'alert';
}

function fmt(n) { return (n||0).toLocaleString(); }

async function loadInsights() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing data...</div>';

  try {
    const today = new Date();
    const fmt_d = d => d.toISOString().split('T')[0];
    const last7from = fmt_d(new Date(today - 7*86400000));
    const last30from = fmt_d(new Date(today - 30*86400000));
    const todayStr = fmt_d(today);

    // Fetch batch dialer stats (7 days and 30 days)
    const [b7, b30, podio] = await Promise.all([
      fetch(`${API_BATCH}/api/stats/range?from=${last7from}&to=${todayStr}`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API_BATCH}/api/stats/range?from=${last30from}&to=${todayStr}`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API_PODIO}/api/podio/stats?from=2019-01-01&to=${todayStr}`).then(r=>r.json()).catch(()=>({}))
    ]);

    // --- CALCULATIONS ---
    const totalCalls7    = b7.total || 0;
    const answered7      = b7.answered || 0;
    const answerRate7    = b7.real_answer_rate || b7.answer_rate || 0;
    const avgDur7        = b7.avg_dur || '0:00';
    const agents7        = b7.agents || [];

    const totalCalls30   = b30.total || 0;
    const answered30     = b30.answered || 0;
    const answerRate30   = b30.real_answer_rate || b30.answer_rate || 0;

    const totalLeads     = podio.total || 0;
    const byState        = podio.by_state || [];
    const bySource       = podio.by_source || [];
    const byCategory     = podio.by_category || [];

    // Weekly call volume trend
    const callTrend = totalCalls30 > 0 ? ((totalCalls7 / (totalCalls30/4)) - 1) * 100 : 0;

    // Top agent
    const topAgent = agents7.sort((a,b) => b.answered - a.answered)[0] || {};
    const topAgentRate = topAgent.rate || 0;

    // Top lead source
    const topSource = bySource[0] || {};
    const topSourcePct = totalLeads > 0 ? (topSource.count/totalLeads*100) : 0;

    // Top state concentration
    const topState = byState[0] || {};
    const topStatePct = totalLeads > 0 ? (topState.count/totalLeads*100) : 0;

    // Follow-up specialist % (check if too high)
    const followUp = byCategory.find(c => c.name && c.name.toLowerCase().includes('follow')) || {};
    const followUpPct = totalLeads > 0 ? (followUp.count/totalLeads*100) : 0;

    // Sold leads
    const sold = byCategory.find(c => c.name && c.name.toLowerCase().includes('sold')) || {};
    const soldPct = totalLeads > 0 ? (sold.count/totalLeads*100) : 0;

    // --- BUILD INSIGHTS ---
    const insights = [];

    // Answer rate insight
    const arGrade = grade(answerRate7, 80, 50);
    insights.push({
      type: arGrade,
      icon: arGrade==='good'?'✅':arGrade==='warning'?'⚠️':'🚨',
      badge: arGrade==='good'?'Good':'Needs Attention',
      title: 'Answer Rate (Last 7 Days)',
      value: answerRate7.toFixed(1)+'%',
      desc: answerRate7 >= 80
        ? `Strong answer rate. Agents are connecting well with prospects.`
        : answerRate7 >= 50
        ? `Answer rate is moderate. Consider calling at peak hours (9-11am, 1-3pm).`
        : `Low answer rate. Review call timing, number spam scores, and agent availability.`
    });

    // Call volume trend
    const trendGrade = callTrend >= 5 ? 'good' : callTrend >= -10 ? 'info' : 'warning';
    insights.push({
      type: trendGrade,
      icon: callTrend >= 0 ? '📈' : '📉',
      badge: callTrend >= 0 ? 'Trending Up' : 'Declining',
      title: 'Weekly Call Volume Trend',
      value: (callTrend >= 0 ? '+' : '') + callTrend.toFixed(1)+'%',
      desc: `Last 7 days: ${fmt(totalCalls7)} calls vs ${fmt(Math.round(totalCalls30/4))} weekly avg (last 30 days).`
    });

    // Lead concentration in top state
    const stateGrade = topStatePct > 80 ? 'warning' : topStatePct > 60 ? 'info' : 'good';
    insights.push({
      type: stateGrade,
      icon: '🗺️',
      badge: topStatePct > 80 ? 'High Concentration' : 'Diversified',
      title: 'Geographic Concentration',
      value: topStatePct.toFixed(1)+'%',
      desc: `${topStatePct.toFixed(1)}% of all leads are in ${topState.name||'N/A'} (${fmt(topState.count)} leads). ${topStatePct > 80 ? 'Consider expanding to other states to reduce risk.' : 'Good geographic spread.'}`
    });

    // Top lead source dependency
    const srcGrade = topSourcePct > 70 ? 'warning' : 'good';
    insights.push({
      type: srcGrade,
      icon: '🎯',
      badge: topSourcePct > 70 ? 'Source Risk' : 'Healthy Mix',
      title: 'Lead Source Dependency',
      value: topSourcePct.toFixed(1)+'%',
      desc: `"${topSource.name||'N/A'}" accounts for ${topSourcePct.toFixed(1)}% of leads. ${topSourcePct > 70 ? 'Diversify lead sources to reduce dependency.' : 'Good mix of lead sources.'}`
    });

    // Follow-up specialist pipeline health
    const fuGrade = followUpPct > 60 ? 'warning' : followUpPct > 30 ? 'info' : 'good';
    insights.push({
      type: fuGrade,
      icon: '🔄',
      badge: followUpPct > 60 ? 'Pipeline Bottleneck' : 'Normal',
      title: 'Follow-Up Pipeline',
      value: followUpPct.toFixed(1)+'%',
      desc: `${followUpPct.toFixed(1)}% of leads are in Follow-Up Specialist category (${fmt(followUp.count||0)} leads). ${followUpPct > 60 ? 'High follow-up queue — consider increasing acquisition manager capacity.' : 'Pipeline is flowing well.'}`
    });

    // Conversion to sold
    const soldGrade = soldPct > 5 ? 'good' : soldPct > 2 ? 'warning' : 'alert';
    insights.push({
      type: soldGrade,
      icon: '💰',
      badge: soldPct > 5 ? 'Strong' : soldPct > 2 ? 'Moderate' : 'Low',
      title: 'Lead-to-Sold Conversion',
      value: soldPct.toFixed(2)+'%',
      desc: `${fmt(sold.count||0)} leads marked as Sold out of ${fmt(totalLeads)} total (${soldPct.toFixed(2)}%). ${soldPct > 5 ? 'Excellent conversion rate.' : soldPct > 2 ? 'Moderate conversion. Focus on follow-up quality.' : 'Low conversion rate. Review acquisition process.'}`
    });

    // --- RECOMMENDATIONS ---
    const recs = [];
    let rNum = 1;

    if (answerRate7 < 50) {
      recs.push({ title: 'Improve Answer Rate', body: `Current answer rate is ${answerRate7.toFixed(1)}%. Audit call times — try calling between 9-11 AM and 1-3 PM local time. Check if numbers are flagged as spam using a number reputation tool.` });
    }
    if (callTrend < -10) {
      recs.push({ title: 'Increase Call Volume', body: `Call volume dropped ${Math.abs(callTrend).toFixed(1)}% vs last month average. Set daily call targets per agent and track adherence.` });
    }
    if (topStatePct > 80) {
      recs.push({ title: 'Geographic Diversification', body: `Over 80% of leads are from ${topState.name}. Expand campaigns to neighboring states to reduce market concentration risk.` });
    }
    if (topSourcePct > 70) {
      recs.push({ title: 'Diversify Lead Sources', body: `"${topSource.name}" dominates at ${topSourcePct.toFixed(1)}%. Add at least 2 new lead sources (direct mail, probate, MLS expired listings) to reduce dependency.` });
    }
    if (followUpPct > 60) {
      recs.push({ title: 'Clear Follow-Up Backlog', body: `${followUpPct.toFixed(1)}% of leads are stuck in follow-up. Assign dedicated follow-up specialists and set a maximum 48h response SLA.` });
    }
    if (soldPct < 2) {
      recs.push({ title: 'Review Acquisition Process', body: `Conversion rate is below 2%. Analyze lost deals — identify the most common objection and build a response script. Consider a closing specialist role.` });
    }
    if (recs.length === 0) {
      recs.push({ title: 'Keep Up the Good Work!', body: `All key metrics are within healthy ranges. Continue monitoring weekly and focus on scaling what's working.` });
    }

    // --- RENDER ---
    let html = '';

    // Key metrics summary
    html += `<div class="section-title">Key Metrics Summary</div>`;
    html += `<div class="metric-row">
      <div class="metric"><div class="metric-val">${fmt(totalLeads)}</div><div class="metric-lbl">Total Leads</div></div>
      <div class="metric"><div class="metric-val">${fmt(totalCalls7)}</div><div class="metric-lbl">Calls (7 Days)</div></div>
      <div class="metric"><div class="metric-val">${answerRate7.toFixed(1)}%</div><div class="metric-lbl">Answer Rate</div></div>
      <div class="metric"><div class="metric-val">${soldPct.toFixed(2)}%</div><div class="metric-lbl">Conversion Rate</div></div>
    </div>`;

    // Insights
    html += `<div class="section-title">Automated Insights</div>`;
    html += `<div class="insights-grid">`;
    insights.forEach(ins => {
      html += `<div class="insight-card ${ins.type}">
        <div class="insight-icon">${ins.icon}</div>
        <div class="badge-status badge-${ins.type}">${ins.badge}</div>
        <div class="insight-title">${ins.title}</div>
        <div class="insight-value">${ins.value}</div>
        <div class="insight-desc">${ins.desc}</div>
      </div>`;
    });
    html += `</div>`;

    // Recommendations
    html += `<div class="section-title">Recommendations</div>`;
    recs.forEach((r, i) => {
      html += `<div class="rec-box">
        <div class="rec-header"><div class="rec-num">${i+1}</div><div class="rec-title">${r.title}</div></div>
        <div class="rec-body">${r.body}</div>
      </div>`;
    });

    document.getElementById('content').innerHTML = html;
    document.getElementById('lastUpdated').textContent = 'Updated · ' + new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">Failed to load data. Check API connection.</div>';
    console.error(e);
  }
}

loadInsights();
</script>
</body>
</html>
